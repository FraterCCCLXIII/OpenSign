<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Molecule Affiliate Contract</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #2563eb;
        --accent-dark: #1d4ed8;
        --border: #e5e7eb;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 40%);
        color: var(--text);
      }
      .wrap {
        max-width: 560px;
        margin: 0 auto;
        padding: 48px 20px 64px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
      }
      .badge {
        display: inline-block;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--accent);
        background: #eff6ff;
        padding: 6px 10px;
        border-radius: 999px;
        margin-bottom: 16px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.2;
      }
      .subtitle {
        margin: 0 0 24px;
        color: var(--muted);
        line-height: 1.5;
      }
      label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 16px;
        margin-bottom: 16px;
      }
      input:focus {
        outline: 2px solid #bfdbfe;
        border-color: #93c5fd;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 14px 16px;
        font-size: 16px;
        font-weight: 600;
        color: white;
        background: var(--accent);
        cursor: pointer;
      }
      button:hover { background: var(--accent-dark); }
      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      .error {
        background: #fef2f2;
        color: #b91c1c;
        border: 1px solid #fecaca;
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 16px;
        font-size: 14px;
      }
      .note {
        margin-top: 18px;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="badge">Molecule Peptides</div>
        <h1 id="title">Affiliate Contract</h1>
        <p class="subtitle" id="description">
          Complete the form below to review and sign the affiliate agreement.
        </p>
        <div id="error" class="error" hidden></div>
        <form id="sign-form">
          <label for="name">Full name</label>
          <input id="name" name="name" autocomplete="name" required />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required />

          <label for="phone">Phone (optional)</label>
          <input id="phone" name="phone" type="tel" autocomplete="tel" />

          <button id="submit" type="submit">Continue to signing</button>
        </form>
        <p class="note">
          This link can be shared with any affiliate. Each submission creates a separate signed agreement for your records.
        </p>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const templateId = params.get("templateid") || "GLZFhKgcY8";
      const errorEl = document.getElementById("error");
      const form = document.getElementById("sign-form");
      const submitBtn = document.getElementById("submit");

      async function loadTemplate() {
        try {
          const res = await fetch(`/publicsign/api/template/${templateId}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Unable to load template.");
          if (data.Name) document.getElementById("title").textContent = data.Name;
          if (data.Description) document.getElementById("description").textContent = data.Description;
        } catch (error) {
          showError(error.message);
          submitBtn.disabled = true;
        }
      }

      function showError(message) {
        errorEl.hidden = false;
        errorEl.textContent = message;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorEl.hidden = true;
        submitBtn.disabled = true;
        submitBtn.textContent = "Preparing document...";

        const payload = {
          templateId,
          name: document.getElementById("name").value.trim(),
          email: document.getElementById("email").value.trim(),
          phone: document.getElementById("phone").value.trim()
        };

        try {
          const res = await fetch("/publicsign/api/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Unable to start signing.");
          window.location.href = data.signUrl;
        } catch (error) {
          showError(error.message);
          submitBtn.disabled = false;
          submitBtn.textContent = "Continue to signing";
        }
      });

      loadTemplate();
    </script>
  </body>
</html>
